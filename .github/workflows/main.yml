name: Release Creation

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch module.json
        run: |
          jq --arg ver "${{ steps.get_version.outputs.version }}" \
             --arg url "https://github.com/${{ github.repository }}" \
             --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
             --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" \
             '.version=$ver | .url=$url | .manifest=$manifest | .download=$download' \
             module.json > module.patched.json && mv module.patched.json module.json

      - name: Create module zip
        run: |
          zip -r ./module.zip . \
            --exclude '.git/*' \
            --exclude '.github/*' \
            --exclude '*.zip' \
            --exclude 'node_modules/*'

      - name: Update release with files
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.unpublished }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
